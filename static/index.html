<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>全球新闻阅读影响趋势预测</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/auth.js"></script>
</head>
<body class="bg-gray-100">
    <div x-data="newsApp()" x-init="init()" class="container mx-auto p-4">
        <!-- 导航栏 -->
        <nav class="bg-white shadow mb-6 p-4 rounded-lg flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-800">🌍 全球新闻阅读影响趋势预测</h1>
            <div class="space-x-4">
                <a href="/stats.html" class="text-blue-600 hover:underline">📊 统计</a>
                <a href="/admin.html" class="text-blue-600 hover:underline">🔧 管理</a>
                <button @click="logout" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm">退出</button>
            </div>
        </nav>

        <!-- 新闻列表 -->
        <div class="grid gap-4">
            <template x-for="item in news" :key="item.id">
                <div class="bg-white p-4 rounded-lg shadow hover:shadow-md transition">
                    <div class="flex justify-between items-start">
                        <div>
                            <h2 class="text-xl font-semibold text-blue-800" x-text="item.title"></h2>
                            <p class="text-sm text-gray-500">
                                <span x-text="item.source_name"></span> · 
                                <span x-text="new Date(item.published_at).toLocaleString()"></span>
                            </p>
                        </div>
                        <button @click="markNoise(item.id)" 
                                class="bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1 rounded-full text-sm transition">
                            🗑️ 标记为噪音
                        </button>
                    </div>
                    <p class="mt-2 text-gray-700" x-text="item.summary"></p>
                    <a :href="'/news_detail.html?id=' + item.id" class="inline-block mt-3 text-blue-600 hover:underline">
                        阅读全文 →
                    </a>
                </div>
            </template>
        </div>
        <div class="mt-6 flex justify-between">
            <button @click="prevPage()" :disabled="page === 1" 
                    class="bg-gray-300 hover:bg-gray-400 px-4 py-2 rounded disabled:opacity-50">
                上一页
            </button>
            <span class="text-gray-600">第 <span x-text="page"></span> 页</span>
            <button @click="nextPage()" 
                    class="bg-gray-300 hover:bg-gray-400 px-4 py-2 rounded">
                下一页
            </button>
        </div>
    </div>

    <script>
        function newsApp() {
            return {
                news: [],
                page: 1,
                async init() {
                    Auth.requireAuth();
                    await this.fetchNews();
                },
                async fetchNews() {
                    const headers = { 'Content-Type': 'application/json', ...Auth.getHeaders() };
                    const res = await fetch(`/api/news?page=${this.page}&per_page=10`, { headers });
                    if (res.ok) {
                        this.news = await res.json();
                    } else if (res.status === 401) {
                        Auth.logout();
                    } else {
                        console.error('加载新闻失败');
                    }
                },
                async markNoise(id) {
                    const headers = { 'Content-Type': 'application/json', ...Auth.getHeaders() };
                    const res = await fetch(`/api/news/${id}/noise`, { method: 'POST', headers });
                    if (res.ok) {
                        this.news = this.news.filter(item => item.id !== id);
                    } else if (res.status === 401) {
                        Auth.logout();
                    } else {
                        alert('标记失败');
                    }
                },
                prevPage() {
                    if (this.page > 1) {
                        this.page--;
                        this.fetchNews();
                    }
                },
                nextPage() {
                    this.page++;
                    this.fetchNews();
                },
                logout() {
                    Auth.logout();
                }
            }
        }
    </script>
</body>
</html>
