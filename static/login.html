<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - 全球新闻阅读影响趋势预测</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/auth.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div x-data="loginForm()" class="bg-white p-8 rounded-lg shadow-md w-96">
        <h1 class="text-2xl font-bold mb-6 text-center">登录</h1>
        <form @submit.prevent="login">
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">用户名</label>
                <input type="text" x-model="name" class="w-full border rounded px-3 py-2" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">密码</label>
                <input type="password" x-model="password" class="w-full border rounded px-3 py-2" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">登录</button>
        </form>
        <p class="mt-4 text-center text-sm text-gray-600">
            还没有账号？<a href="/register.html" class="text-blue-600 hover:underline">注册</a>
        </p>
        <div x-show="error" class="mt-4 text-red-600 text-sm" x-text="error"></div>
    </div>
    <script>
        function loginForm() {
            return {
                name: '',
                password: '',
                error: '',
                async login() {
                    this.error = '';
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: this.name, password: this.password })
                    });
                    if (res.ok) {
                        const data = await res.json();
                        Auth.setToken(data.token);
                        window.location.href = '/';
                    } else {
                        this.error = '登录失败，请检查用户名和密码';
                    }
                }
            }
        }
    </script>
</body>
</html>
