<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>注册 - 全球新闻阅读影响趋势预测</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/auth.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div x-data="registerForm()" class="bg-white p-8 rounded-lg shadow-md w-96">
        <h1 class="text-2xl font-bold mb-6 text-center">注册</h1>
        <form @submit.prevent="register">
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">用户名</label>
                <input type="text" x-model="name" class="w-full border rounded px-3 py-2" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">密码（至少6位）</label>
                <input type="password" x-model="password" class="w-full border rounded px-3 py-2" required minlength="6">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">角色</label>
                <select x-model="role" class="w-full border rounded px-3 py-2">
                    <option value="human_expert">阅读研究专家</option>
                    <option value="admin">管理员</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">注册</button>
        </form>
        <p class="mt-4 text-center text-sm text-gray-600">
            已有账号？<a href="/login.html" class="text-blue-600 hover:underline">登录</a>
        </p>
        <div x-show="error" class="mt-4 text-red-600 text-sm" x-text="error"></div>
    </div>
    <script>
        function registerForm() {
            return {
                name: '',
                password: '',
                role: 'human_expert',
                error: '',
                async register() {
                    this.error = '';
                    const res = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: this.name, password: this.password, role: this.role })
                    });
                    if (res.ok) {
                        const data = await res.json();
                        Auth.setToken(data.token);
                        window.location.href = '/';
                    } else {
                        this.error = '注册失败，用户名可能已存在';
                    }
                }
            }
        }
    </script>
</body>
</html>
